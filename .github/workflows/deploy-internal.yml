# ──────────────────────────────────────────────────
# Deploy Internal — 可复用内部分发工作流 (Firebase)
# 其他项目引用方式:
#   jobs:
#     deploy:
#       uses: CSDchenshaodong/android-template/.github/workflows/deploy-internal.yml@v1
#       secrets: inherit
# ──────────────────────────────────────────────────
name: Deploy Internal (Reusable)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'JDK 版本'
        type: string
        default: '17'
      java-distribution:
        description: 'JDK 发行版'
        type: string
        default: 'temurin'
      build-task:
        description: '构建任务名'
        type: string
        default: 'assembleStagingRelease'
      apk-path:
        description: 'APK 输出路径'
        type: string
        default: 'app/build/outputs/apk/staging/release/app-staging-release.apk'
      firebase-groups:
        description: 'Firebase 分发测试组，逗号分隔'
        type: string
        default: 'qa-team,dev-team'
      keystore-path:
        description: '解密后的 keystore 文件路径'
        type: string
        default: 'app/release.keystore'
      notify-slack:
        description: '是否发送 Slack 通知'
        type: boolean
        default: true
    secrets:
      FIREBASE_APP_ID:
        description: 'Firebase 应用 ID'
        required: true
      FIREBASE_CREDENTIALS:
        description: 'Firebase 服务账号凭证 JSON'
        required: true
      KEYSTORE_BASE64:
        description: '签名文件 Base64 编码'
        required: true
      KEYSTORE_PASSWORD:
        description: '签名密钥库密码'
        required: true
      KEY_ALIAS:
        description: '签名别名'
        required: true
      KEY_PASSWORD:
        description: '签名密钥密码'
        required: true
      SLACK_WEBHOOK_URL:
        description: 'Slack Webhook URL（可选）'
        required: false

concurrency:
  group: deploy-internal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}

      - uses: gradle/actions/setup-gradle@v3

      # 解密签名文件
      - name: Decrypt keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > ${{ inputs.keystore-path }}

      # 生成 Release Notes
      - name: Generate release notes
        id: notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --since="7 days ago" --pretty=format:"- %s" --no-merges)
          fi
          {
            echo "📦 Build: ${{ github.run_number }}"
            echo "🌿 分支: ${{ github.ref_name }}"
            echo "🔖 提交: $(git rev-parse --short HEAD)"
            echo ""
            echo "📝 变更:"
            echo "$CHANGES"
          } > release_notes.txt
          cat release_notes.txt

      # 构建
      - name: Build ${{ inputs.build-task }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew ${{ inputs.build-task }} \
            -PRELEASE_KEYSTORE_PATH=${{ inputs.keystore-path }} \
            -PRELEASE_KEYSTORE_PASSWORD="$KEYSTORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$KEY_PASSWORD"

      # 上传 Firebase App Distribution
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: ${{ inputs.firebase-groups }}
          file: ${{ inputs.apk-path }}
          releaseNotesFile: release_notes.txt

      # 通知 Slack
      - name: Notify Slack
        if: ${{ inputs.notify-slack && secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "📱 新测试版本已就绪\n版本号: ${{ github.run_number }}\n分支: ${{ github.ref_name }}\nFirebase 组: ${{ inputs.firebase-groups }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
