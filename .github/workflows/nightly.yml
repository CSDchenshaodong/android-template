# ──────────────────────────────────────────────────
# Nightly Full Build — 可复用夜间全面构建工作流
# 消费项目可调度触发或手动触发，引用方式:
#   jobs:
#     nightly:
#       uses: CSDchenshaodong/android-template/.github/workflows/nightly.yml@v1
#       secrets: inherit
# ──────────────────────────────────────────────────
name: Nightly Full Build (Reusable)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'JDK 版本'
        type: string
        default: '17'
      java-distribution:
        description: 'JDK 发行版'
        type: string
        default: 'temurin'
      emulator-api-level:
        description: '模拟器 API 级别'
        type: string
        default: '34'
      lint-task:
        description: 'Lint 任务名'
        type: string
        default: 'lintDebug'
      ktlint-task:
        description: 'ktlint 任务名（留空跳过）'
        type: string
        default: 'ktlintCheck'
      detekt-task:
        description: 'Detekt 任务名（留空跳过）'
        type: string
        default: 'detekt'
      unit-test-task:
        description: '单元测试任务名'
        type: string
        default: 'testDebugUnitTest'
      instrumented-test-task:
        description: '仪器化测试任务名（留空跳过）'
        type: string
        default: 'connectedAndroidTest'
      jacoco-report-task:
        description: 'JaCoCo 报告生成任务名（留空跳过）'
        type: string
        default: 'jacocoTestReport'
      benchmark-task:
        description: '性能基准测试任务名（留空跳过）'
        type: string
        default: ':benchmark:connectedCheck'
      notify-slack:
        description: '失败时是否通知 Slack'
        type: boolean
        default: true
    secrets:
      SLACK_WEBHOOK_URL:
        description: 'Slack Webhook URL（可选）'
        required: false

jobs:
  full-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}

      - uses: gradle/actions/setup-gradle@v3

      - name: Run lint checks
        run: |
          TASKS=""
          [ -n "${{ inputs.ktlint-task }}" ] && TASKS="$TASKS ${{ inputs.ktlint-task }}"
          [ -n "${{ inputs.detekt-task }}" ] && TASKS="$TASKS ${{ inputs.detekt-task }}"
          [ -n "${{ inputs.lint-task }}" ] && TASKS="$TASKS ${{ inputs.lint-task }}"
          if [ -n "$TASKS" ]; then
            ./gradlew $TASKS --continue
          fi

      - name: Run unit tests
        run: ./gradlew ${{ inputs.unit-test-task }}

      - name: Generate coverage report
        if: ${{ inputs.jacoco-report-task != '' }}
        run: ./gradlew ${{ inputs.jacoco-report-task }}

      - name: Run instrumented tests on emulator
        if: ${{ inputs.instrumented-test-task != '' }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.emulator-api-level }}
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: |
            ./gradlew clean
            ./gradlew ${{ inputs.instrumented-test-task }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-reports
          path: |
            **/build/reports/
            **/build/test-results/

      # 性能基准测试
      - name: Run benchmarks
        if: ${{ inputs.benchmark-task != '' }}
        run: |
          ./gradlew ${{ inputs.benchmark-task }} || echo "Benchmark completed with warnings"

      # 失败通知
      - name: Notify Slack if failed
        if: ${{ failure() && inputs.notify-slack && secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ 夜间构建失败！\nActions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
