# ──────────────────────────────────────────────────
# Release to Play Store — 可复用商店上架工作流
# 其他项目引用方式:
#   jobs:
#     release:
#       uses: CSDchenshaodong/android-template/.github/workflows/release-store.yml@v1
#       secrets: inherit
#       with:
#         track: 'internal'
# ──────────────────────────────────────────────────
name: Release to Play Store (Reusable)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'JDK 版本'
        type: string
        default: '17'
      java-distribution:
        description: 'JDK 发行版'
        type: string
        default: 'temurin'
      ruby-version:
        description: 'Ruby 版本（fastlane 需要）'
        type: string
        default: '3.3'
      track:
        description: '发布轨道: internal, alpha, beta, production_staged, production_full, halt_rollout'
        type: string
        required: true
        default: 'internal'
      rollout-percentage:
        description: '渐进发布百分比（仅 production_staged 时使用）'
        type: string
        default: '10'
      package-name:
        description: '应用包名 (用于 fastlane Appfile)'
        type: string
        default: ''
      bundle-task:
        description: 'AAB 构建任务名'
        type: string
        default: 'bundleRelease'
      keystore-path:
        description: '解密后的 keystore 文件路径'
        type: string
        default: 'app/release.keystore'
      metadata-path:
        description: 'Play Store 元数据路径（fastlane metadata）'
        type: string
        default: './fastlane/metadata/android'
      notify-slack:
        description: '是否发送 Slack 通知'
        type: boolean
        default: true
      # ── 渐进式发布参数 ──
      enable-staged-rollout:
        description: '是否启用自动渐进式发布（需要 Crashlytics）'
        type: boolean
        default: false
      crash-free-threshold:
        description: '崩溃率阈值百分比（低于此值自动暂停）'
        type: string
        default: '99.5'
      staged-percentages:
        description: '渐进发布阶段百分比 (JSON 数组)'
        type: string
        default: '[10, 25, 50, 100]'
      staged-wait-minutes:
        description: '每阶段等待分钟数 (JSON 数组)'
        type: string
        default: '[30, 60, 120, 0]'
    secrets:
      KEYSTORE_BASE64:
        description: '签名文件 Base64 编码'
        required: true
      KEYSTORE_PASSWORD:
        description: '签名密钥库密码'
        required: true
      KEY_ALIAS:
        description: '签名别名'
        required: true
      KEY_PASSWORD:
        description: '签名密钥密码'
        required: true
      PLAY_STORE_JSON_BASE64:
        description: 'Google Play 服务账号 JSON 的 Base64 编码'
        required: true
      SLACK_WEBHOOK_URL:
        description: 'Slack Webhook URL（可选）'
        required: false
      FIREBASE_APP_ID:
        description: 'Firebase 应用 ID（渐进发布监控崩溃率时需要）'
        required: false
      FIREBASE_CREDENTIALS:
        description: 'Firebase 服务账号凭证（渐进发布监控崩溃率时需要）'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true

      - name: Decrypt keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > ${{ inputs.keystore-path }}

      # Google Play 服务账号密钥
      - name: Setup Play Store credentials
        env:
          PLAY_STORE_JSON_BASE64: ${{ secrets.PLAY_STORE_JSON_BASE64 }}
        run: echo "$PLAY_STORE_JSON_BASE64" | base64 -d > play-store-key.json

      # fastlane 执行上架
      - name: Run fastlane ${{ inputs.track }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_STORE_JSON_KEY_FILE: play-store-key.json
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PACKAGE_NAME: ${{ inputs.package-name }}
          METADATA_PATH: ${{ inputs.metadata-path }}
          ROLLOUT_PERCENTAGE: ${{ inputs.rollout-percentage }}
          CRASH_FREE_THRESHOLD: ${{ inputs.crash-free-threshold }}
          STAGED_PERCENTAGES: ${{ inputs.staged-percentages }}
          STAGED_WAIT_MINUTES: ${{ inputs.staged-wait-minutes }}
          ENABLE_STAGED_ROLLOUT: ${{ inputs.enable-staged-rollout }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          BUNDLE_TASK: ${{ inputs.bundle-task }}
        run: |
          TRACK="${{ inputs.track }}"

          if [ "$TRACK" = "production_staged" ]; then
            bundle exec fastlane production_staged percentage:${{ inputs.rollout-percentage }}
          else
            bundle exec fastlane $TRACK
          fi
